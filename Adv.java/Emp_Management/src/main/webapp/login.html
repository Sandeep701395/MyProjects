<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
	*{
	padding: 0;
	margin: 0;
	box-sizing: border-box;
	}
	body{
	height: 100vh;
	width: 100vw;
	background-color: lightgreen;
	border-radius:20px;
	display: flex;
	justify-content: center;
	align-items: center;
	}
	h1{
	color: darkblue;
	}
	#form_container{
		height: 35vh;
		width: 25%;
		border: 1px solid;
		display: flex;
		flex-direction:column;
		justify-content: space-evenly;
		align-items: center;
		background-color: lightpink;
		border-radius: 10px;
		box-shadow: inset 0px 0px 10px yellow,inset 0px 0px 15px greenyellow;  	
	}
	.input_boxes{
	height: 5vh;
	width: 60%;
	outline:none;
	border:none;
	padding:10px;
	border-radius: 10px;
	}
	button{
	height: 5vh;
	width: 30%;
	color: white;
	background-color: purple;
	outline: none;
	border: none;
	border-radius: 10px;
	cursor: pointer;
	padding:5px 10px;
	font-weight:bold;
	font-size:1rem;
	box-shadow: inset 0px 0px 10px skyblue,inset 0px 0px 15px skyblue;
	
	}
	a{
	text-decoration: none;
	color: red;
	font-weight: bold;
	font-size: 20px;
	}
	
	
</style>
</head>
<body>
	<form action="login" method="post" id="form_container">
	<h1>Login Page</h1>
	<input type="text" name="email" class="input_boxes" placeholder="Email">
	<input type="text" name="pwd" class="input_boxes" placeholder="Password">
	<button>Submit</button>
	<p>Not registered yet? <a href="register.html">Register</a> </p>
	</form>
	
</body>
</html>
