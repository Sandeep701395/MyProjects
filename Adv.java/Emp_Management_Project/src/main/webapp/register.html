<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family:Georgia, 'Times New Roman', Times, serif;
        }
        body{
            background-image: linear-gradient(to left,green,red);
        }
        #formContainer{
            height:500px;
            width: 40%;
            /* border: solid; */
            margin:50px auto;
            display: flex;
             background-image: linear-gradient(to top,darkblue,rgb(241, 236, 236));
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            border-radius: 15px;
            /* background-color: transparent; */
            box-shadow: 0px 0px 5px,0px 0px 5px ;
            

        }
        input{
            width:250px;
            /* text-align: center; */
            padding: 8px 15px;
            border: none;
            outline: none;
            border-radius: 7px;
            font-weight: 700;
        }
        input:focus{
            border: 1px solid red;
        }
        button{
            width: 125px;
            background-color: blue;
            border: none;
            outline: none;
            border-radius: 15px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            padding: 8px 15px;
        }
        p{
            color: white;
            text-decoration: none;
            font-size: 18px;
        }
        a{
            color: red;
            text-decoration: none;
            font-size: 22px;
        }
    </style>
</head>
<body>
    <form action="register" method="post" id="formContainer">

        <h1>Register Employee</h1>
        <input type="number" placeholder="EmployeeId" name="id">
        <input type="text" placeholder="EnterName" name="name">
        <input type="number" placeholder="Salary" name="sal">
        <input type="email" placeholder="Email" name="email">
        <input type="password" placeholder="Password" name="pwd">
        <input type="tel" placeholder="MobileNumber" name="phno">
        <input type="text" placeholder="Designation" name="designation">
        <input type="text" placeholder="Location" name="location">
        <button>Register</button>
        <p>Already Registered ?<a href="login.html"> LogIn</a></p>
    </form>
    
</body>
</html>
