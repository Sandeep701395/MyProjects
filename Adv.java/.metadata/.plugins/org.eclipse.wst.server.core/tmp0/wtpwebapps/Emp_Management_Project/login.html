<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        *{
            padding:0;
            margin: 0;
            box-sizing: border-box;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            /* background-image: linear-gradient(to top,yellow,red); */
        }
        body{
            background-image: linear-gradient(to top,rgb(231, 231, 191),rgb(111, 104, 104));
            display: flex;
            /* flex-direction:column; */
            
            justify-content: center;
            align-items: center;
        }
        #formContainer{
            height: 280px;
            width: 30%;
            /* border: 2px solid; */
            border-radius: 10px;
            padding: 10px;
            margin:150px auto;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            box-shadow: 0px 0px 6px,0px 2px 5px;

            /* background-image: linear-gradient(to top,yellow,red); */

        }
        h1{
            color:white;
            margin-bottom: 20px;
        }
        input{
            width: 220px;
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 600;
            border: none;
            outline: none;
            color:black;
            box-shadow: 0px 0px 3px;
            
            
        }
        button{
            width: 150px;
            padding: 8px 15px;
            background-color: blue;
            border: none;
            border-radius: 20px;
            font-size: 20px;
            color: white;
            font-weight: bold ;
            cursor: pointer;
        }
        p{
            font-size: 20px;
        }
        a{
            font-size: 22px;
            color: darkblue;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <form action="login" method="post" id="formContainer">
        <h1>Login Page</h1>
        <input type="email" name="email" id="" placeholder="Email">
        <input type="password" name="pwd" id="" placeholder="Password">
        <button type="submit">Login</button>
        <p>Not registered yet ? <a href="register.html">Register</a></p>
    </form>
    
</body>
</html>
