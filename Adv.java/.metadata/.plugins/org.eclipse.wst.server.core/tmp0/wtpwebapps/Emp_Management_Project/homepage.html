<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
           /*  background-color: lightgray; */
           background-image: linear-gradient(to top,white,greenyellow);
        }
        #container{
            height: 130px;
            width: 30%;
            /* border: solid; */
            border-radius: 13px;
            background-image: linear-gradient(to top,white,greenyellow);
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            margin:200px auto;
            box-shadow: 0px 0px 5px;
        }
        button{
            width: 180px;
            padding: 8px 15px;
            border: none;
            outline: none;
            border-radius: 10px;
            background-color: black;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0px 0px 5px;
        }
    </style>
</head>
<body>

    <div id="container">
        <h1>Login Successful!!!</h1>
        <form action="home" method="post">
            <button type="submit">Emp Details</button>
        </form>
    </div>
    
</body>
</html>
